services:
  rusvel:
    build: .
    ports:
      - "3000:3000"
    environment:
      RUST_LOG: info
      RUSVEL_OLLAMA_URL: http://ollama:11434
    depends_on:
      - ollama
    volumes:
      - rusvel-data:/data

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama

volumes:
  rusvel-data:
  ollama-models:
